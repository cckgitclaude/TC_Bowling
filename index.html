<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bowling Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }
  input, button { font-family: inherit; font-size: 14px; outline: none; }
  input { border: 1.5px solid #d1d5db; border-radius: 8px; padding: 6px 10px; background: #fff; color: #111; width: 100%; box-sizing: border-box; }
  input:focus { border-color: #3b82f6; }
  input[type="file"] { border: none; background: none; width: auto; padding: 0; }
  button { border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 14px; cursor: pointer; background: #fff; color: #374151; transition: opacity 0.15s; }
  button:hover { opacity: 0.82; }
  table { width: 100%; border-collapse: collapse; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://ntvkvhjjlndvxcppylqa.supabase.co";
const SUPABASE_KEY = "sb_publishable_u_HABir8HeojzUJKM6yY9A_TfcYzcGa";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TABS1 = ["roster","selection","scores","leaderboard"];
const TABS2 = ["history","import","backup","settings"];
const TAB_LABELS = { roster:"Roster", selection:"Player Selection", scores:"Score Entry", leaderboard:"Leaderboard", history:"Score History", import:"Import Excel", backup:"Backup / Restore", settings:"Settings" };

function calcHandicap(avg, base, factor) { return Math.max(0, Math.round((base - avg) * factor)); }

function PwGate({ title, onUnlock }) {
  const [pw, setPw] = useState(""), [err, setErr] = useState(false);
  function attempt() { if (pw === "12345") { onUnlock(); setPw(""); setErr(false); } else setErr(true); }
  return (
    <div style={{ background:"#fff", border:"1px solid #e5e7eb", borderRadius:12, padding:20, maxWidth:340 }}>
      <p style={{ fontWeight:600, marginBottom:12 }}>{title}</p>
      <div style={{ display:"flex", gap:8 }}>
        <input type="password" placeholder="Password" value={pw}
          onChange={e=>{ setPw(e.target.value); setErr(false); }}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          style={{ flex:1, width:"auto", borderColor:err?"#ef4444":undefined }} />
        <button onClick={attempt} style={{ background:"#3b82f6", color:"#fff", border:"none", padding:"6px 16px" }}>Unlock</button>
      </div>
      {err && <p style={{ color:"#ef4444", fontSize:13, marginTop:6 }}>Incorrect password.</p>}
    </div>
  );
}

function Spinner() {
  return (
    <div style={{ display:"flex", justifyContent:"center", padding:"2.5rem" }}>
      <div style={{ width:28, height:28, border:"3px solid #bfdbfe", borderTopColor:"#3b82f6", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("roster");
  const [bowlers, setBowlers] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [settings, setSettings] = useState({ base:220, factor:80, teamName:"My Team" });
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [newName, setNewName] = useState("");
  const [dupError, setDupError] = useState(false);
  const [sessionScores, setSessionScores] = useState({});
  const [activeBowlers, setActiveBowlers] = useState([]);
  const [bowlerSearch, setBowlerSearch] = useState("");
  const [sessionDate, setSessionDate] = useState(new Date().toISOString().slice(0,10));
  const [saved, setSaved] = useState(false);
  const [unlocked, setUnlocked] = useState({ history:false, import:false, backup:false, settings:false });
  const [importStatus, setImportStatus] = useState(null);
  const [backupStatus, setBackupStatus] = useState(null);
  const [restoreMode, setRestoreMode] = useState("merge");
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const fileInputRef = useRef(null);

  function showToast(type, msg) { setToast({ type, msg }); setTimeout(()=>setToast(null), 3000); }
  function unlock(k) { setUnlocked(p=>({...p,[k]:true})); }
  function lock(k) { setUnlocked(p=>({...p,[k]:false})); }

  // ── Load from Supabase ──
  useEffect(()=>{
    async function load() {
      setLoading(true);
      try {
        const [{ data:bData }, { data:sData }, { data:stData }] = await Promise.all([
          sb.from("bowlers").select("*"),
          sb.from("sessions").select("*").order("date",{ ascending:false }),
          sb.from("settings").select("*").eq("id","config").single(),
        ]);
        if (bData) setBowlers(bData);
        if (sData) setSessions(sData);
        if (stData?.data) setSettings(stData.data);
      } catch(e) { showToast("error","Could not load data from cloud."); }
      setLoading(false);
    }
    load();
  },[]);

  useEffect(()=>{ const init={}; bowlers.forEach(b=>{ init[b.id]=["","",""]; }); setSessionScores(init); },[bowlers]);

  const factor = settings.factor/100, base = Number(settings.base);

  function getBowlerAvg(b) {
    const bs = sessions.filter(s=>(s.scores[b.id]||[]).some(x=>x!==""&&x!==null)).slice(0,7);
    const past = bs.flatMap(s=>(s.scores[b.id]||[]).filter(x=>x!==""&&x!==null));
    return past.length ? past.reduce((a,x)=>a+Number(x),0)/past.length : 0;
  }
  function getBowlerHighGame(b) {
    const all = sessions.flatMap(s=>(s.scores[b.id]||[]).filter(x=>x!==""&&x!==null).map(Number));
    return all.length ? Math.max(...all) : 0;
  }
  function getBowlerHighSeries(b) {
    let high=0;
    sessions.forEach(s=>{ const gs=(s.scores[b.id]||[]).filter(x=>x!==""&&x!==null).map(Number); if(gs.length===3) high=Math.max(high,gs.reduce((a,x)=>a+x,0)); });
    return high;
  }
  function getLastBowled(b) {
    const s = sessions.find(s=>(s.scores[b.id]||[]).some(x=>x!==""&&x!==null));
    return s ? s.date : null;
  }

  async function addBowler() {
    const name=newName.trim(); if(!name) return;
    if(bowlers.some(b=>b.name.toLowerCase()===name.toLowerCase())) { setDupError(true); setTimeout(()=>setDupError(false),2500); return; }
    const nb={ id:Date.now().toString(), name };
    setBowlers(prev=>[...prev,nb]); setNewName(""); setDupError(false);
    const { error } = await sb.from("bowlers").insert(nb);
    if(error) showToast("error","Failed to save bowler."); else showToast("success","Bowler added.");
  }
  async function removeBowler(id) {
    setBowlers(prev=>prev.filter(b=>b.id!==id));
    await sb.from("bowlers").delete().eq("id",id);
  }
  function toggleBowler(id) { setActiveBowlers(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]); }
  function updateScore(bid,gi,val) {
    setSessionScores(prev=>{ const arr=[...(prev[bid]||["","",""])]; arr[gi]=val===""?"":Math.min(300,Math.max(0,Number(val))); return {...prev,[bid]:arr}; });
  }
  async function saveSession() {
    const fs={}; activeBowlers.forEach(id=>{ fs[id]=sessionScores[id]||["","",""]; });
    const ns={ id:Date.now().toString(), date:sessionDate, scores:fs };
    setSessions(prev=>[ns,...prev].sort((a,b)=>b.date.localeCompare(a.date)));
    const reset={}; bowlers.forEach(b=>{ reset[b.id]=["","",""]; }); setSessionScores(reset); setActiveBowlers([]);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
    const { error } = await sb.from("sessions").insert(ns);
    if(error) showToast("error","Failed to save session to cloud."); else showToast("success","Session saved to cloud ✓");
  }
  async function deleteSession(sid) {
    setSessions(prev=>prev.filter(s=>s.id!==sid));
    await sb.from("sessions").delete().eq("id",sid);
  }
  async function saveSettings(ns) {
    setSettings(ns);
    await sb.from("settings").upsert({ id:"config", data:ns });
  }

  // History edit
  function startEdit(s) {
    const d={}; bowlers.forEach(b=>{ d[b.id]=(s.scores[b.id]||["","",""]).map(x=>x===null?"":x); });
    setEditDraft(d); setEditingId(s.id);
  }
  function cancelEdit() { setEditingId(null); setEditDraft({}); }
  function setEditScore(bid,gi,val) {
    setEditDraft(prev=>{ const arr=[...(prev[bid]||["","",""])]; arr[gi]=val===""?"":Math.min(300,Math.max(0,Number(val))); return {...prev,[bid]:arr}; });
  }
  async function saveEdit(sid) {
    setSessions(prev=>prev.map(s=>s.id===sid?{...s,scores:editDraft}:s));
    setEditingId(null); setEditDraft({});
    const { error } = await sb.from("sessions").update({ scores:editDraft }).eq("id",sid);
    if(error) showToast("error","Failed to save edits to cloud."); else showToast("success","Scores updated ✓");
  }

  function normalizeDate(raw) {
    if(typeof raw==="number") { const d=new Date(Math.round((raw-25569)*86400*1000)); return d.toISOString().slice(0,10); }
    const s=String(raw).trim();
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [dd,mm,yyyy]=s.split("/"); return `${yyyy}-${mm}-${dd}`; }
    return s;
  }

  async function handleFileImport(e) {
    const file=e.target.files[0]; if(!file) return; setImportStatus(null);
    const reader=new FileReader();
    reader.onload=async evt=>{
      try {
        const wb=XLSX.read(new Uint8Array(evt.target.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rawRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(!rawRows.length) throw new Error("No data found.");
        let hIdx=-1,hMap={};
        for(let i=0;i<Math.min(5,rawRows.length);i++) {
          const row=rawRows[i].map(c=>String(c).toLowerCase().trim());
          const ni=row.indexOf("name"),di=row.indexOf("date"),g1=row.indexOf("game1"),g2=row.indexOf("game2"),g3=row.indexOf("game3");
          if(ni!==-1&&di!==-1&&g1!==-1&&g2!==-1&&g3!==-1) { hIdx=i; hMap={name:ni,date:di,game1:g1,game2:g2,game3:g3}; break; }
        }
        if(hIdx===-1) throw new Error("Headers not found. Need: name, date, game1, game2, game3");
        const dataRows=rawRows.slice(hIdx+1).filter(r=>r.some(c=>c!==""));
        const bMap={},sMap={};
        dataRows.forEach(row=>{
          const name=String(row[hMap.name]||"").trim(),date=normalizeDate(row[hMap.date]);
          if(!name||!date) return;
          if(!bMap[name]) { const ex=bowlers.find(b=>b.name.toLowerCase()===name.toLowerCase()); bMap[name]=ex?ex.id:(Date.now().toString()+Math.random().toString(36).slice(2)); }
          if(!sMap[date]) sMap[date]={ id:date+"_imp",date,scores:{} };
          sMap[date].scores[bMap[name]]=[Number(row[hMap.game1]),Number(row[hMap.game2]),Number(row[hMap.game3])];
        });
        const ib=Object.entries(bMap).map(([name,id])=>({id,name}));
        const is2=Object.values(sMap).sort((a,b)=>b.date.localeCompare(a.date));
        const newB=ib.filter(b=>!bowlers.some(ex=>ex.name.toLowerCase()===b.name.toLowerCase()));
        const existDates=new Set(sessions.map(s=>s.date));
        const newS=is2.filter(s=>!existDates.has(s.date));
        if(newB.length) { await sb.from("bowlers").insert(newB); setBowlers(prev=>[...prev,...newB]); }
        if(newS.length) { await sb.from("sessions").insert(newS); setSessions(prev=>[...prev,...newS].sort((a,b)=>b.date.localeCompare(a.date))); }
        setImportStatus({ type:"success", msg:`Imported ${newB.length} bowler(s) and ${newS.length} session(s).` });
      } catch(err) { setImportStatus({ type:"error", msg:err.message }); }
      if(fileInputRef.current) fileInputRef.current.value="";
    };
    reader.onerror=()=>setImportStatus({ type:"error", msg:"Failed to read file." });
    reader.readAsArrayBuffer(file);
  }

  function exportExcel() {
    const rows=leaderboard.map((b,i)=>({ Rank:i+1, Name:b.name, Average:b.avg?Math.round(b.avg):"—", Handicap:b.avg?Math.round(b.handicap):"—", "High Game":b.highGame||"—", "High Series":b.highSeries||"—", "Last Bowled":b.lastBowled||"—" }));
    const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Leaderboard");
    XLSX.writeFile(wb,`${settings.teamName}_Leaderboard_${sessionDate}.xlsx`);
  }

  function exportPDF() {
    const rows=leaderboard.map((b,i)=>`<tr><td>${i+1}</td><td>${b.name}</td><td>${b.avg?Math.round(b.avg):"—"}</td><td>${b.avg?Math.round(b.handicap):"—"}</td><td>${b.highGame||"—"}</td><td>${b.highSeries||"—"}</td><td>${b.lastBowled||"—"}</td></tr>`).join("");
    const html=`<!DOCTYPE html><html><head><meta charset='utf-8'><title>${settings.teamName}</title><style>body{font-family:Arial,sans-serif;padding:24px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#185fa5;color:#fff;padding:8px 10px;text-align:left}td{padding:7px 10px;border-bottom:1px solid #e0e0e0}</style></head><body><h2>${settings.teamName} Leaderboard</h2><p>${sessionDate} | Base:${settings.base} Factor:${settings.factor}%</p><table><thead><tr><th>#</th><th>Name</th><th>Avg</th><th>Hcap</th><th>Hi Game</th><th>Hi Series</th><th>Last Bowled</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
    const blob=new Blob([html],{type:"text/html"}),url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download=`${settings.teamName}_Leaderboard.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function exportBackup() {
    const payload={ version:1, exportedAt:new Date().toISOString(), settings, bowlers, sessions };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download=`${settings.teamName}_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    setBackupStatus({ type:"success", msg:"Backup downloaded." });
  }

  async function handleRestoreFile(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async evt=>{
      try {
        const data=JSON.parse(evt.target.result);
        if(!data.bowlers||!data.sessions) throw new Error("Invalid backup file.");
        if(restoreMode==="replace") {
          await sb.from("bowlers").delete().neq("id","__none__");
          await sb.from("sessions").delete().neq("id","__none__");
          await sb.from("bowlers").insert(data.bowlers);
          await sb.from("sessions").insert(data.sessions);
          if(data.settings) await sb.from("settings").upsert({ id:"config", data:data.settings });
          setBowlers(data.bowlers); setSessions(data.sessions); if(data.settings) setSettings(data.settings);
          setBackupStatus({ type:"success", msg:"Restore complete. All data replaced." });
        } else {
          const ids=new Set(bowlers.map(b=>b.id)), names=new Set(bowlers.map(b=>b.name.toLowerCase()));
          const newB=(data.bowlers||[]).filter(b=>!ids.has(b.id)&&!names.has(b.name.toLowerCase()));
          const dates=new Set(sessions.map(s=>s.date));
          const newS=(data.sessions||[]).filter(s=>!dates.has(s.date));
          if(newB.length) { await sb.from("bowlers").insert(newB); setBowlers(prev=>[...prev,...newB]); }
          if(newS.length) { await sb.from("sessions").insert(newS); setSessions(prev=>[...prev,...newS].sort((a,b)=>b.date.localeCompare(a.date))); }
          setBackupStatus({ type:"success", msg:`Merged: +${newB.length} bowlers, +${newS.length} sessions.` });
        }
      } catch(err) { setBackupStatus({ type:"error", msg:err.message }); }
      e.target.value="";
    };
    reader.readAsText(file);
  }

  const leaderboard=bowlers.map(b=>{
    const avg=getBowlerAvg(b),handicap=calcHandicap(avg,base,factor);
    const ts=(sessionScores[b.id]||[]).filter(x=>x!=="").map(Number);
    return { ...b, avg:Math.round(avg*10)/10, handicap, scratch:ts.reduce((a,x)=>a+x,0), games:ts.length, highGame:getBowlerHighGame(b), highSeries:getBowlerHighSeries(b), lastBowled:getLastBowled(b) };
  }).sort((a,b)=>b.avg-a.avg);

  // ── Styles ──
  const wrap = { maxWidth:680, margin:"0 auto", padding:"16px 16px 60px" };
  const cardS = { background:"#fff", border:"1px solid #e5e7eb", borderRadius:12, padding:"14px 16px", marginBottom:12 };
  const tabBtnS = active => ({ background:active?"#eff6ff":"#f9fafb", color:active?"#1d4ed8":"#6b7280", border:`1px solid ${active?"#bfdbfe":"#e5e7eb"}`, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:13, fontWeight:active?600:400 });
  const btnS = (bg,color,border) => ({ background:bg, color, border:`1px solid ${border}`, borderRadius:8, padding:"5px 13px", cursor:"pointer", fontSize:13, fontWeight:500 });
  const inputS = { border:"1.5px solid #d1d5db", borderRadius:8, padding:"6px 10px", fontSize:14, width:"100%", boxSizing:"border-box" };
  const smTxt = { color:"#6b7280", fontSize:13 };

  return (
    <div style={wrap}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:2 }}>
        <h2 style={{ color:"#1d4ed8", fontSize:22, fontWeight:700 }}>{settings.teamName}</h2>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:loading?"#f59e0b":"#16a34a" }}/>
          <span style={{ fontSize:12, color:"#9ca3af" }}>{loading?"loading...":"cloud sync on"}</span>
        </div>
      </div>
      <p style={{ ...smTxt, marginBottom:16 }}>Bowling score &amp; handicap tracker</p>

      {/* Toast */}
      {toast && (
        <div style={{ background:toast.type==="success"?"#f0fdf4":"#fef2f2", border:`1px solid ${toast.type==="success"?"#bbf7d0":"#fecaca"}`, borderRadius:10, padding:"8px 14px", marginBottom:12 }}>
          <p style={{ color:toast.type==="success"?"#15803d":"#b91c1c", fontSize:13 }}>{toast.msg}</p>
        </div>
      )}

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
        {TABS1.map(t=><button key={t} onClick={()=>setTab(t)} style={tabBtnS(tab===t)}>{TAB_LABELS[t]}</button>)}
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:20, flexWrap:"wrap" }}>
        {TABS2.map(t=><button key={t} onClick={()=>setTab(t)} style={tabBtnS(tab===t)}>{TAB_LABELS[t]}</button>)}
      </div>

      {loading && <Spinner/>}
      {!loading && <>

      {/* ── ROSTER ── */}
      {tab==="roster" && (
        <div>
          <div style={cardS}>
            <p style={{ ...smTxt, marginBottom:8 }}>Add bowler</p>
            <div style={{ display:"flex", gap:8 }}>
              <input placeholder="Bowler name" value={newName} onChange={e=>{ setNewName(e.target.value); setDupError(false); }} onKeyDown={e=>e.key==="Enter"&&addBowler()} style={{ ...inputS, flex:1, width:"auto", borderColor:dupError?"#ef4444":undefined }} />
              <button onClick={addBowler} style={btnS("#eff6ff","#1d4ed8","#bfdbfe")}>Add</button>
            </div>
            {dupError && <p style={{ color:"#ef4444", fontSize:13, marginTop:6 }}>Name already exists.</p>}
          </div>
          {bowlers.length===0 && <p style={smTxt}>No bowlers yet.</p>}
          <div style={{ background:"#fff", border:"1px solid #e5e7eb", borderRadius:12, overflow:"hidden" }}>
            {[...bowlers].sort((a,b)=>a.name.localeCompare(b.name)).map((b,i)=>{
              const avg=getBowlerAvg(b),hcap=calcHandicap(avg,base,factor);
              return (
                <div key={b.id} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr auto", gap:8, alignItems:"center", padding:"9px 14px", borderTop:i>0?"1px solid #f3f4f6":"none" }}>
                  <span style={{ fontWeight:500, fontSize:13 }}>{b.name}</span>
                  <span style={{ ...smTxt, fontSize:12, textAlign:"center" }}>Avg: {avg?Math.round(avg):"—"}</span>
                  <span style={{ ...smTxt, fontSize:12, textAlign:"center" }}>Hcap: {avg?hcap:"—"}</span>
                  <button onClick={()=>removeBowler(b.id)} style={btnS("#fef2f2","#b91c1c","#fecaca")}>Remove</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── SELECTION ── */}
      {tab==="selection" && (
        <div>
          <div style={cardS}>
            <p style={{ ...smTxt, marginBottom:6 }}>Session date</p>
            <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} style={inputS} />
          </div>
          {bowlers.length===0 && <p style={smTxt}>Add bowlers first.</p>}
          {bowlers.length>0 && (
            <div style={cardS}>
              <p style={{ ...smTxt, marginBottom:8 }}>Tap to select players</p>
              <input
                placeholder="Search bowlers..."
                value={bowlerSearch}
                onChange={e=>setBowlerSearch(e.target.value)}
                style={{ ...inputS, marginBottom:10 }}
              />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                {[...bowlers]
                  .sort((a,b)=>a.name.localeCompare(b.name))
                  .filter(b=>b.name.toLowerCase().includes(bowlerSearch.toLowerCase()))
                  .map(b=>{
                    const active=activeBowlers.includes(b.id);
                    return <button key={b.id} onClick={()=>toggleBowler(b.id)} style={btnS(active?"#fef2f2":"#f9fafb",active?"#b91c1c":"#6b7280",active?"#fecaca":"#e5e7eb")}>{active?"✓ ":""}{b.name}</button>;
                  })
                }
              </div>
              {[...bowlers].filter(b=>b.name.toLowerCase().includes(bowlerSearch.toLowerCase())).length===0 && (
                <p style={{ ...smTxt, fontSize:12, marginTop:8 }}>No bowlers match "{bowlerSearch}"</p>
              )}
            </div>
          )}
          {activeBowlers.length>0 && (
            <div style={{ ...cardS, background:"#f9fafb" }}>
              <p style={{ ...smTxt, marginBottom:6 }}>Selected ({activeBowlers.length})</p>
              {bowlers.filter(b=>activeBowlers.includes(b.id)).map(b=><p key={b.id} style={{ fontSize:14, margin:"3px 0" }}>{b.name}</p>)}
              <button onClick={()=>setTab("scores")} style={{ ...btnS("#eff6ff","#1d4ed8","#bfdbfe"), marginTop:10 }}>Go to Score Entry →</button>
            </div>
          )}
        </div>
      )}

      {/* ── SCORES ── */}
      {tab==="scores" && (
        <div>
          {activeBowlers.length===0 && <p style={smTxt}>No players selected. Go to Player Selection first.</p>}
          {bowlers.filter(b=>activeBowlers.includes(b.id)).map(b=>{
            const avg=getBowlerAvg(b),hcap=calcHandicap(avg,base,factor);
            const scores=sessionScores[b.id]||["","",""];
            const filled=scores.filter(x=>x!=="").map(Number);
            const total=filled.reduce((a,x)=>a+x,0);
            return (
              <div key={b.id} style={{ ...cardS, padding:"10px 14px" }}>
                <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr", gap:8, alignItems:"center" }}>
                  <div>
                    <p style={{ fontWeight:600, fontSize:13 }}>{b.name}</p>
                    <p style={{ ...smTxt, fontSize:11 }}>Avg {avg?Math.round(avg):"—"} · Hcap {avg?hcap:"—"}</p>
                  </div>
                  {[0,1,2].map(i=>(
                    <input key={i} type="number" min="0" max="300" placeholder={`G${i+1}`} value={scores[i]} onChange={e=>updateScore(b.id,i,e.target.value)} style={{ border:"1.5px solid #d1d5db", borderRadius:8, padding:"5px 4px", fontSize:13, textAlign:"center", width:"100%" }} />
                  ))}
                  <div style={{ background:"#f9fafb", borderRadius:8, padding:"4px 6px", textAlign:"center" }}>
                    <p style={{ ...smTxt, fontSize:10 }}>Scratch</p>
                    <p style={{ fontWeight:600, fontSize:13 }}>{filled.length>0?total:"—"}</p>
                  </div>
                  <div style={{ background:"#f9fafb", borderRadius:8, padding:"4px 6px", textAlign:"center" }}>
                    <p style={{ ...smTxt, fontSize:10 }}>+Hcap</p>
                    <p style={{ fontWeight:600, fontSize:13 }}>{filled.length>0?total+hcap*filled.length:"—"}</p>
                  </div>
                </div>
              </div>
            );
          })}
          {activeBowlers.length>0 && (
            <button onClick={saveSession} style={{ width:"100%", padding:"11px 0", fontWeight:600, fontSize:15, background:saved?"#f0fdf4":"#eff6ff", color:saved?"#15803d":"#1d4ed8", border:`1px solid ${saved?"#bbf7d0":"#bfdbfe"}`, borderRadius:10, cursor:"pointer", marginTop:4 }}>
              {saved?"Session saved to cloud! ✓":"Save session"}
            </button>
          )}
        </div>
      )}

      {/* ── LEADERBOARD ── */}
      {tab==="leaderboard" && (
        <div>
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            <button onClick={exportExcel} style={btnS("#f0fdf4","#15803d","#bbf7d0")}>Export Excel</button>
            <button onClick={exportPDF} style={btnS("#fef2f2","#b91c1c","#fecaca")}>Export &amp; Print</button>
          </div>
          {leaderboard.length===0 && <p style={smTxt}>No bowlers yet.</p>}
          <div style={{ background:"#fff", border:"1px solid #e5e7eb", borderRadius:12, overflow:"hidden" }}>
            <table>
              <thead>
                <tr style={{ background:"#f9fafb" }}>
                  {["#","Name","Avg","Hcap","Hi Game","Hi Series","Last Bowled"].map((h,i)=>(
                    <th key={h} style={{ padding:"9px 10px", textAlign:i>1?"center":"left", fontWeight:600, color:"#6b7280", fontSize:11 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {leaderboard.map((b,i)=>(
                  <tr key={b.id} style={{ borderTop:"1px solid #f3f4f6" }}>
                    <td style={{ padding:"9px 10px", color:"#9ca3af", fontSize:11 }}>{i+1}</td>
                    <td style={{ padding:"9px 10px", fontWeight:600, fontSize:13 }}>{b.name}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:13 }}>{b.avg?Math.round(b.avg):"—"}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:13 }}>{b.avg?Math.round(b.handicap):"—"}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:13 }}>{b.highGame||"—"}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:13 }}>{b.highSeries||"—"}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:12, color:"#6b7280" }}>{b.lastBowled||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── HISTORY ── */}
      {tab==="history" && !unlocked.history && <PwGate title="Enter password to view score history" onUnlock={()=>unlock("history")} />}
      {tab==="history" && unlocked.history && (
        <div>
          {sessions.length===0 && <p style={smTxt}>No sessions recorded yet.</p>}
          {sessions.map(s=>{
            const isEditing=editingId===s.id;
            const participants=bowlers.filter(b=>(s.scores[b.id]||[]).some(x=>x!==""&&x!==null));
            return (
              <div key={s.id} style={{ ...cardS, padding:"12px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontWeight:700, fontSize:14, color:"#111827" }}>{s.date}</span>
                  <div style={{ display:"flex", gap:8 }}>
                    {isEditing ? <>
                      <button onClick={()=>saveEdit(s.id)} style={btnS("#f0fdf4","#15803d","#bbf7d0")}>Save</button>
                      <button onClick={cancelEdit} style={btnS("#f9fafb","#6b7280","#e5e7eb")}>Cancel</button>
                    </> : <>
                      <button onClick={()=>startEdit(s)} style={btnS("#eff6ff","#1d4ed8","#bfdbfe")}>Edit</button>
                      <button onClick={()=>deleteSession(s.id)} style={btnS("#fef2f2","#b91c1c","#fecaca")}>Delete</button>
                    </>}
                  </div>
                </div>
                {!isEditing && participants.map(b=>{
                  const gs=(s.scores[b.id]||[]).filter(x=>x!==""&&x!==null);
                  if(!gs.length) return null;
                  return (
                    <div key={b.id} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderTop:"1px solid #f3f4f6", fontSize:13 }}>
                      <span style={{ color:"#374151", fontWeight:500 }}>{b.name}</span>
                      <span style={{ color:"#6b7280" }}>{gs.join(" | ")} &nbsp;=&nbsp; <strong style={{ color:"#111" }}>{gs.reduce((a,x)=>a+Number(x),0)}</strong></span>
                    </div>
                  );
                })}
                {isEditing && (
                  <div>
                    <p style={{ ...smTxt, fontSize:12, marginBottom:10 }}>Edit scores then tap Save</p>
                    {participants.map(b=>{
                      const sc=editDraft[b.id]||["","",""];
                      const nums=sc.filter(x=>x!=="").map(Number);
                      return (
                        <div key={b.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderTop:"1px solid #f3f4f6", flexWrap:"wrap" }}>
                          <span style={{ fontSize:13, fontWeight:600, width:90, flexShrink:0, color:"#111" }}>{b.name}</span>
                          {[0,1,2].map(i=>(
                            <input key={i} type="number" min="0" max="300" placeholder={`G${i+1}`} value={sc[i]}
                              onChange={e=>setEditScore(b.id,i,e.target.value)}
                              style={{ width:60, padding:"5px 6px", fontSize:13, textAlign:"center", border:"1.5px solid #d1d5db", borderRadius:7 }} />
                          ))}
                          <span style={{ fontSize:13, color:"#6b7280" }}>= <strong style={{ color:"#111" }}>{nums.length>0?nums.reduce((a,x)=>a+x,0):"—"}</strong></span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
          <button onClick={()=>lock("history")} style={{ marginTop:4, background:"transparent", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:13 }}>Lock history</button>
        </div>
      )}

      {/* ── IMPORT ── */}
      {tab==="import" && !unlocked.import && <PwGate title="Enter password to import Excel" onUnlock={()=>unlock("import")} />}
      {tab==="import" && unlocked.import && (
        <div>
          <div style={cardS}>
            <p style={{ fontWeight:600, marginBottom:6 }}>Upload Excel file</p>
            <div style={{ background:"#f9fafb", borderRadius:8, padding:"10px 14px", fontFamily:"monospace", fontSize:13, marginBottom:14 }}>name | date | game1 | game2 | game3</div>
            <input ref={fileInputRef} type="file" accept=".xlsx,.xls" onChange={handleFileImport} />
          </div>
          {importStatus && (
            <div style={{ ...cardS, background:importStatus.type==="success"?"#f0fdf4":"#fef2f2", borderColor:importStatus.type==="success"?"#bbf7d0":"#fecaca" }}>
              <p style={{ color:importStatus.type==="success"?"#15803d":"#b91c1c", fontSize:14 }}>{importStatus.msg}</p>
            </div>
          )}
          <button onClick={()=>lock("import")} style={{ marginTop:4, background:"transparent", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:13 }}>Lock import</button>
        </div>
      )}

      {/* ── BACKUP ── */}
      {tab==="backup" && !unlocked.backup && <PwGate title="Enter password to access Backup / Restore" onUnlock={()=>unlock("backup")} />}
      {tab==="backup" && unlocked.backup && (
        <div>
          <div style={cardS}>
            <p style={{ fontWeight:600, marginBottom:4 }}>Export full backup</p>
            <p style={{ ...smTxt, marginBottom:12 }}>Downloads a JSON file with all bowlers, sessions and settings from the cloud.</p>
            <button onClick={exportBackup} style={btnS("#f0fdf4","#15803d","#bbf7d0")}>Download JSON Backup</button>
            <p style={{ ...smTxt, marginTop:10 }}>Bowlers: {bowlers.length} · Sessions: {sessions.length}</p>
          </div>
          <div style={cardS}>
            <p style={{ fontWeight:600, marginBottom:4 }}>Restore from backup</p>
            <div style={{ display:"flex", gap:8, marginBottom:12 }}>
              {["merge","replace"].map(m=>(
                <button key={m} onClick={()=>setRestoreMode(m)} style={btnS(restoreMode===m?"#eff6ff":"#f9fafb",restoreMode===m?"#1d4ed8":"#6b7280",restoreMode===m?"#bfdbfe":"#e5e7eb")}>
                  {m==="merge"?"Merge":"Replace all"}
                </button>
              ))}
            </div>
            <input type="file" accept=".json" onChange={handleRestoreFile} />
            <p style={{ ...smTxt, marginTop:8 }}><strong>Merge:</strong> adds new data, keeps existing. <strong>Replace:</strong> wipes everything.</p>
          </div>
          {backupStatus && (
            <div style={{ ...cardS, background:backupStatus.type==="success"?"#f0fdf4":"#fef2f2", borderColor:backupStatus.type==="success"?"#bbf7d0":"#fecaca" }}>
              <p style={{ color:backupStatus.type==="success"?"#15803d":"#b91c1c", fontSize:14 }}>{backupStatus.msg}</p>
            </div>
          )}
          <button onClick={()=>lock("backup")} style={{ marginTop:4, background:"transparent", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:13 }}>Lock backup</button>
        </div>
      )}

      {/* ── SETTINGS ── */}
      {tab==="settings" && !unlocked.settings && <PwGate title="Enter password to access settings" onUnlock={()=>unlock("settings")} />}
      {tab==="settings" && unlocked.settings && (
        <div>
          <div style={cardS}>
            <p style={{ ...smTxt, marginBottom:6 }}>Team name</p>
            <input value={settings.teamName} onChange={e=>saveSettings({...settings,teamName:e.target.value})} style={inputS} />
          </div>
          <div style={cardS}>
            <p style={{ ...smTxt, marginBottom:6 }}>Handicap base score</p>
            <input type="number" value={settings.base} onChange={e=>saveSettings({...settings,base:e.target.value})} style={inputS} />
          </div>
          <div style={cardS}>
            <p style={{ ...smTxt, marginBottom:6 }}>Handicap factor (%)</p>
            <input type="number" min="50" max="100" value={settings.factor} onChange={e=>saveSettings({...settings,factor:e.target.value})} style={inputS} />
          </div>
          <div style={{ ...cardS, background:"#f9fafb" }}>
            <p style={{ ...smTxt, marginBottom:4 }}>Formula</p>
            <p style={{ fontFamily:"monospace", fontSize:14 }}>({settings.base} - avg) × {settings.factor}%</p>
          </div>
          <button onClick={()=>lock("settings")} style={{ marginTop:4, background:"transparent", color:"#6b7280", border:"1px solid #e5e7eb", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:13 }}>Lock settings</button>
        </div>
      )}

      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
